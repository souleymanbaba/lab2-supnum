version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto8
    commands:
      # Le paquet 'maven' des depots amzn2 est trop vieux (3.0.5) pour les plugins du pom.
      # On installe un Maven moderne compatible (>= 3.2.5).
      - MAVEN_VERSION=3.9.9
      - curl -fsSL "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz" -o /tmp/maven.tar.gz
      - tar -xzf /tmp/maven.tar.gz -C /opt
      - export PATH=/opt/apache-maven-${MAVEN_VERSION}/bin:$PATH
  build:
    commands:
      - export PATH=/opt/apache-maven-3.9.9/bin:$PATH
      - mvn -version
      - mvn clean install
      - mvn package
      - mkdir output
      - cp target/*.war output/

artifacts:
  files:
    - output/*.war
    - appspec.yml
    - install_dependencies.sh
    - start_server.sh
    - stop_server.sh
